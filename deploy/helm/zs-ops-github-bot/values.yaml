# Default values for zs-ops-github-bot
replicaCount: 1

image:
  repository: zarishsphere/zs-ops-github-bot
  tag: "latest"
  pullPolicy: IfNotPresent

env:
  - name: GH_TOKEN
    valueFrom:
      secretKeyRef:
        name: github-bot-secret
        key: token
  - name: WEBHOOK_SECRET
    valueFrom:
      secretKeyRef:
        name: github-bot-secret
        key: webhook-secret
  - name: GITHUB_ORG
    value: "zarishsphere"

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: true
  className: ""
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: github-bot.zarishsphere.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: github-bot-tls
      hosts:
        - github-bot.zarishsphere.com

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}